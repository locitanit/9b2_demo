<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dínó Játék</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            text-align: center;
        }
        canvas {
            background: #fff;
            border-bottom: 2px solid #535353;
        }
        #instructions {
            margin-top: 12px;
            color: #535353;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game" width="800" height="250"></canvas>
        <div id="instructions">SPACE/↑ = ugrás (2x = duplaugrás) | Nyomva tartás = repülés | ↓ = guggolás | Mobil: tap/hold/swipe down</div>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Game constants
        const GROUND_Y = 200;
        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const INITIAL_SPEED = 6;
        const MAX_SPEED = 14;

        // Game state
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let highScore = 0;
        let speed = INITIAL_SPEED;
        let frameCount = 0;

        // Dino
        const dino = {
            x: 50,
            y: GROUND_Y,
            width: 44,
            height: 48,
            vy: 0,
            jumping: false,
            ducking: false,
            legFrame: 0,
            jumpCount: 0,
            maxJumps: 2
        };

        // Fly / hold state
        let holdingJump = false;
        const FLY_FORCE = -0.45;
        const FLY_MAX_VY = -6;

        // Obstacles
        let obstacles = [];
        let nextObstacleDistance = 0;

        // Clouds
        let clouds = [];

        // Ground decoration
        let groundOffset = 0;
        let groundBumps = [];
        for (let i = 0; i < 30; i++) {
            groundBumps.push({ x: Math.random() * 900, size: Math.random() * 3 + 1 });
        }

        // --- Drawing functions ---
        function drawDino() {
            ctx.fillStyle = '#535353';
            if (dino.ducking) {
                // Ducking dino (wider, shorter)
                const duckH = 28;
                const duckW = 58;
                const dy = GROUND_Y - duckH;
                // Body
                ctx.fillRect(dino.x, dy, duckW, duckH);
                // Eye
                ctx.fillStyle = '#fff';
                ctx.fillRect(dino.x + duckW - 10, dy + 4, 6, 6);
                ctx.fillStyle = '#535353';
                ctx.fillRect(dino.x + duckW - 8, dy + 6, 3, 3);
                // Legs
                if (dino.legFrame % 10 < 5) {
                    ctx.fillRect(dino.x + 10, dy + duckH, 6, 8);
                    ctx.fillRect(dino.x + 30, dy + duckH, 6, 0);
                } else {
                    ctx.fillRect(dino.x + 10, dy + duckH, 6, 0);
                    ctx.fillRect(dino.x + 30, dy + duckH, 6, 8);
                }
                // Update hitbox for ducking
                dino._hitX = dino.x + 4;
                dino._hitY = dy + 4;
                dino._hitW = duckW - 8;
                dino._hitH = duckH + 4;
            } else {
                const dy = dino.y - dino.height;
                // Body
                ctx.fillRect(dino.x, dy, dino.width, dino.height);
                // Head bump
                ctx.fillRect(dino.x + 18, dy - 14, 26, 16);
                // Eye
                ctx.fillStyle = '#fff';
                ctx.fillRect(dino.x + 32, dy - 10, 7, 7);
                ctx.fillStyle = '#535353';
                ctx.fillRect(dino.x + 35, dy - 8, 4, 4);
                // Mouth
                ctx.fillStyle = '#fff';
                ctx.fillRect(dino.x + 38, dy - 2, 8, 3);
                ctx.fillStyle = '#535353';
                // Arms
                ctx.fillRect(dino.x - 4, dy + 20, 8, 4);
                // Tail
                ctx.fillRect(dino.x - 8, dy + 6, 10, 6);
                ctx.fillRect(dino.x - 14, dy + 2, 8, 6);
                // Legs (animated)
                if (!dino.jumping) {
                    if (dino.legFrame % 10 < 5) {
                        ctx.fillRect(dino.x + 6, dino.y, 8, 10);
                        ctx.fillRect(dino.x + 24, dino.y, 8, 4);
                    } else {
                        ctx.fillRect(dino.x + 6, dino.y, 8, 4);
                        ctx.fillRect(dino.x + 24, dino.y, 8, 10);
                    }
                } else {
                    ctx.fillRect(dino.x + 6, dino.y, 8, 6);
                    ctx.fillRect(dino.x + 24, dino.y, 8, 6);
                }
                // Update hitbox
                dino._hitX = dino.x;
                dino._hitY = dy - 10;
                dino._hitW = dino.width;
                dino._hitH = dino.height + 16;
            }
        }

        function drawCactus(obs) {
            ctx.fillStyle = '#535353';
            const groundLine = GROUND_Y + 10;
            if (obs.type === 'small') {
                // Small cactus
                ctx.fillRect(obs.x + 6, GROUND_Y - 36, 10, 36 + 10);
                ctx.fillRect(obs.x, GROUND_Y - 24, 8, 14);
                ctx.fillRect(obs.x + 14, GROUND_Y - 28, 8, 12);
            } else if (obs.type === 'large') {
                // Large cactus
                ctx.fillRect(obs.x + 8, GROUND_Y - 50, 14, 50 + 10);
                ctx.fillRect(obs.x, GROUND_Y - 36, 10, 18);
                ctx.fillRect(obs.x + 20, GROUND_Y - 42, 10, 18);
            } else if (obs.type === 'group') {
                // Group of cacti
                ctx.fillRect(obs.x + 4, GROUND_Y - 34, 8, 34 + 10);
                ctx.fillRect(obs.x + 18, GROUND_Y - 42, 10, 42 + 10);
                ctx.fillRect(obs.x + 32, GROUND_Y - 30, 8, 30 + 10);
                ctx.fillRect(obs.x + 12, GROUND_Y - 28, 8, 10);
                ctx.fillRect(obs.x + 26, GROUND_Y - 34, 8, 10);
            }
        }

        function drawBird(obs) {
            ctx.fillStyle = '#535353';
            const by = obs.y;
            // Body
            ctx.fillRect(obs.x, by, 30, 10);
            // Beak
            ctx.fillRect(obs.x + 30, by + 2, 8, 5);
            // Tail
            ctx.fillRect(obs.x - 6, by + 1, 8, 7);
            // Wings (animated)
            if (obs.wingFrame % 16 < 8) {
                ctx.fillRect(obs.x + 4, by - 12, 18, 12);
            } else {
                ctx.fillRect(obs.x + 4, by + 10, 18, 12);
            }
        }

        function drawGround() {
            ctx.fillStyle = '#535353';
            ctx.fillRect(0, GROUND_Y + 10, canvas.width, 1);
            // Ground bumps
            for (const bump of groundBumps) {
                const bx = ((bump.x - groundOffset) % (canvas.width + 100) + canvas.width + 100) % (canvas.width + 100) - 50;
                ctx.fillRect(bx, GROUND_Y + 12 + Math.random() * 2, bump.size, 1);
            }
        }

        function drawClouds() {
            ctx.fillStyle = '#ddd';
            for (const cloud of clouds) {
                ctx.fillRect(cloud.x, cloud.y, 46, 14);
                ctx.fillRect(cloud.x + 10, cloud.y - 8, 26, 10);
                ctx.fillRect(cloud.x - 6, cloud.y + 4, 16, 6);
                ctx.fillRect(cloud.x + 36, cloud.y + 4, 16, 6);
            }
        }

        function drawScore() {
            ctx.fillStyle = '#535353';
            ctx.font = '18px Courier New';
            ctx.textAlign = 'right';
            const scoreStr = String(Math.floor(score)).padStart(5, '0');
            if (highScore > 0) {
                ctx.fillText('HI ' + String(highScore).padStart(5, '0') + '  ' + scoreStr, canvas.width - 20, 30);
            } else {
                ctx.fillText(scoreStr, canvas.width - 20, 30);
            }
        }

        function drawGameOver() {
            ctx.fillStyle = '#535353';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('G A M E   O V E R', canvas.width / 2, 100);
            // Restart icon
            ctx.beginPath();
            ctx.arc(canvas.width / 2, 145, 18, 0, Math.PI * 2);
            ctx.strokeStyle = '#535353';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Arrow
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 + 1, 127);
            ctx.lineTo(canvas.width / 2 + 10, 133);
            ctx.lineTo(canvas.width / 2 + 1, 133);
            ctx.fillStyle = '#535353';
            ctx.fill();
        }

        function drawStartScreen() {
            ctx.fillStyle = '#535353';
            // Draw standing dino in center-ish
            const cx = canvas.width / 2 - 22;
            const dy = GROUND_Y - 48;
            ctx.fillRect(cx, dy, 44, 48);
            ctx.fillRect(cx + 18, dy - 14, 26, 16);
            ctx.fillStyle = '#fff';
            ctx.fillRect(cx + 32, dy - 10, 7, 7);
            ctx.fillStyle = '#535353';
            ctx.fillRect(cx + 35, dy - 8, 4, 4);
            ctx.fillStyle = '#fff';
            ctx.fillRect(cx + 38, dy - 2, 8, 3);
            ctx.fillStyle = '#535353';
            ctx.fillRect(cx - 4, dy + 20, 8, 4);
            ctx.fillRect(cx - 8, dy + 6, 10, 6);
            ctx.fillRect(cx - 14, dy + 2, 8, 6);
            ctx.fillRect(cx + 6, GROUND_Y, 8, 6);
            ctx.fillRect(cx + 24, GROUND_Y, 8, 6);
            // Ground
            ctx.fillRect(0, GROUND_Y + 10, canvas.width, 1);
        }

        // --- Obstacle spawning ---
        function spawnObstacle() {
            const r = Math.random();
            let obs;
            if (score > 200 && r < 0.25) {
                // Bird
                const birdYOptions = [GROUND_Y - 60, GROUND_Y - 36, GROUND_Y - 16];
                obs = {
                    x: canvas.width + 20,
                    y: birdYOptions[Math.floor(Math.random() * birdYOptions.length)],
                    width: 38,
                    height: 22,
                    isBird: true,
                    wingFrame: 0
                };
            } else {
                const types = ['small', 'large', 'group'];
                const type = types[Math.floor(Math.random() * types.length)];
                let w, h;
                if (type === 'small') { w = 22; h = 36; }
                else if (type === 'large') { w = 30; h = 50; }
                else { w = 42; h = 42; }
                obs = {
                    x: canvas.width + 20,
                    y: GROUND_Y - h,
                    width: w,
                    height: h,
                    type: type,
                    isBird: false
                };
            }
            obstacles.push(obs);
            nextObstacleDistance = 250 + Math.random() * 300;
        }

        // --- Collision ---
        function checkCollision() {
            for (const obs of obstacles) {
                let ox, oy, ow, oh;
                if (obs.isBird) {
                    ox = obs.x + 4; oy = obs.y + 2; ow = obs.width - 8; oh = obs.height - 4;
                } else {
                    ox = obs.x + 4; oy = obs.y + 4; ow = obs.width - 8; oh = obs.height - 4;
                }
                const dx = dino._hitX;
                const dy2 = dino._hitY;
                const dw = dino._hitW;
                const dh = dino._hitH;
                if (dx < ox + ow && dx + dw > ox && dy2 < oy + oh && dy2 + dh > oy) {
                    return true;
                }
            }
            return false;
        }

        // --- Update ---
        function update() {
            if (!gameStarted || gameOver) return;
            frameCount++;
            dino.legFrame++;

            // Score
            score += speed * 0.02;
            speed = Math.min(INITIAL_SPEED + Math.floor(score / 100) * 0.5, MAX_SPEED);

            // Dino physics
            if (dino.jumping) {
                // Fly: holding jump in air reduces gravity
                if (holdingJump && dino.vy > FLY_MAX_VY) {
                    dino.vy += FLY_FORCE;
                }
                dino.vy += GRAVITY;
                dino.y += dino.vy;
                if (dino.y >= GROUND_Y) {
                    dino.y = GROUND_Y;
                    dino.vy = 0;
                    dino.jumping = false;
                    dino.jumpCount = 0;
                }
                // Ceiling
                if (dino.y < 20) {
                    dino.y = 20;
                    dino.vy = 0;
                }
            }

            // Obstacles
            nextObstacleDistance -= speed;
            if (nextObstacleDistance <= 0) {
                spawnObstacle();
            }
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                if (obstacles[i].isBird) {
                    obstacles[i].wingFrame++;
                }
                if (obstacles[i].x + obstacles[i].width < -20) {
                    obstacles.splice(i, 1);
                }
            }

            // Clouds
            if (Math.random() < 0.005) {
                clouds.push({ x: canvas.width + 20, y: 30 + Math.random() * 60 });
            }
            for (let i = clouds.length - 1; i >= 0; i--) {
                clouds[i].x -= speed * 0.3;
                if (clouds[i].x < -60) clouds.splice(i, 1);
            }

            // Ground scroll
            groundOffset += speed;

            // Collision
            // First draw to set hitbox, then check
        }

        // --- Main loop ---
        function gameLoop() {
            update();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameStarted) {
                drawStartScreen();
                requestAnimationFrame(gameLoop);
                return;
            }

            drawClouds();
            drawGround();

            for (const obs of obstacles) {
                if (obs.isBird) {
                    drawBird(obs);
                } else {
                    drawCactus(obs);
                }
            }

            drawDino();
            drawScore();

            if (!gameOver && checkCollision()) {
                gameOver = true;
                if (Math.floor(score) > highScore) {
                    highScore = Math.floor(score);
                }
            }

            if (gameOver) {
                drawGameOver();
            }

            requestAnimationFrame(gameLoop);
        }

        // --- Controls ---
        function jump() {
            if (!gameStarted) {
                gameStarted = true;
                return;
            }
            if (gameOver) {
                // Restart
                gameOver = false;
                score = 0;
                speed = INITIAL_SPEED;
                obstacles = [];
                clouds = [];
                dino.y = GROUND_Y;
                dino.vy = 0;
                dino.jumping = false;
                dino.ducking = false;
                dino.jumpCount = 0;
                nextObstacleDistance = 200;
                return;
            }
            if (dino.ducking) return;
            if (dino.jumpCount < dino.maxJumps) {
                dino.jumping = true;
                dino.vy = JUMP_FORCE;
                dino.jumpCount++;
            }
        }

        // --- Keyboard ---
        const keysDown = {};
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!keysDown[e.code]) {
                    keysDown[e.code] = true;
                    jump();
                }
                holdingJump = true;
            }
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                if (!dino.jumping && gameStarted && !gameOver) {
                    dino.ducking = true;
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                keysDown[e.code] = false;
                holdingJump = false;
            }
            if (e.code === 'ArrowDown') {
                dino.ducking = false;
            }
        });

        // --- Touch support (mobile) ---
        let touchStartY = 0;
        let touchStartTime = 0;
        let touchHoldTimer = null;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartY = touch.clientY;
            touchStartTime = Date.now();
            jump();
            holdingJump = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const dy = touch.clientY - touchStartY;
            // Swipe down to duck
            if (dy > 30 && !dino.jumping && gameStarted && !gameOver) {
                dino.ducking = true;
                holdingJump = false;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            holdingJump = false;
            dino.ducking = false;
        }, { passive: false });

        // Start
        nextObstacleDistance = 200;
        gameLoop();
    </script>
</body>
</html>
